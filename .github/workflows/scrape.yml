name: рҹҺ§ иң»иң“ж’ӯе®ўзҲ¬иҷ«
on:
  # жүӢеҠЁи§ҰеҸ‘
  workflow_dispatch:
    inputs:
      channel_id:
        description: 'иң»иң“йў‘йҒ“ID (еҰӮ 427910)'
        required: true
        type: string
      worker_base:
        description: 'Workerйҹійў‘д»ЈзҗҶең°еқҖ'
        required: false
        default: 'https://qtfm-podcast.general74110.workers.dev'
        type: string

  # Telegram Bot и§ҰеҸ‘
  repository_dispatch:
    types: [scrape]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: рҹ“Ҙ жЈҖеҮәд»Јз Ғ
        uses: actions/checkout@v4

      - name: рҹ”Қ и§ЈжһҗеҸӮж•°
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "channel_id=${{ github.event.client_payload.channel_id }}" >> $GITHUB_OUTPUT
            echo "worker_base=${{ github.event.client_payload.worker_base || 'https://qtfm-podcast.general74110.workers.dev' }}" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.client_payload.title }}" >> $GITHUB_OUTPUT
          else
            echo "channel_id=${{ github.event.inputs.channel_id }}" >> $GITHUB_OUTPUT
            echo "worker_base=${{ github.event.inputs.worker_base || 'https://qtfm-podcast.general74110.workers.dev' }}" >> $GITHUB_OUTPUT
            echo "title=жүӢеҠЁи§ҰеҸ‘" >> $GITHUB_OUTPUT
          fi

      - name: рҹҡҖ иҝҗиЎҢзҲ¬иҷ«
        run: |
          echo "жҠ“еҸ–йў‘йҒ“: ${{ steps.params.outputs.channel_id }}"
          node scripts/scrape.js
        env:
          CHANNEL_ID: ${{ steps.params.outputs.channel_id }}
          WORKER_BASE: ${{ steps.params.outputs.worker_base }}
          OUT_DIR: novels
          MAX_PROGRAMS: 5000

      - name: рҹ“Ӣ з”ҹжҲҗйў‘йҒ“еҲ—иЎЁ
        run: |
          node -e "
            const fs = require('fs');
            const dir = 'novels';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && f !== 'index.json');
            let html = '<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>иң»иң“FMж’ӯе®ўеҲ—иЎЁ</title>';
            html += '<style>body{font-family:sans-serif;max-width:800px;margin:auto;padding:2em;line-height:1.6}</style></head><body>';
            html += '<h1>рҹҺ§ иң»иң“FMж’ӯе®ўи®ўйҳ…</h1><ul>';
            const index = files.map(f => JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8')));
            index.sort((a,b) => new Date(b.generatedAt) - new Date(a.generatedAt));
            for (const m of index) {
              html += \`<li><a href=\"/qtfm-podcast/\${m.channelId}.xml\">\${m.title}</a> (\${m.programs}йӣҶпјҢ\${m.duration})</li>\`;
            }
            html += '</ul></body></html>';
            fs.writeFileSync(path.join(dir, 'index.html'), html);
          "

      - name: рҹ“Ө йғЁзҪІеҲ° GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./novels
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true

      - name: рҹ“ў жҺЁйҖҒе®ҢжҲҗеҗҺйҖҡзҹҘTelegram
        if: ${{ steps.params.outputs.channel_id != '' }}
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CHANNEL_ID: ${{ steps.params.outputs.channel_id }}
          TITLE: ${{ steps.params.outputs.title }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT_ID}&parse_mode=HTML&text=вң… <b>жҠ“еҸ–е®ҢжҲҗ</b>

        йў‘йҒ“: ${TITLE:-${CHANNEL_ID}}
        ID: ${CHANNEL_ID}

        рҹ“– Appleж’ӯе®ўи®ўйҳ…й“ҫжҺҘ:
        https://general74110.github.io/qtfm-podcast/${CHANNEL_ID}.xml

        рҹҺ§ Workerд»ЈзҗҶпјҲдёҚиҝҮжңҹпјү:
        https://qtfm-podcast.general74110.workers.dev/${CHANNEL_ID}"